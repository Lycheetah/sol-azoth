<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Sol's Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Courier New', monospace;
  }
  .game-container {
    background: #12121a;
    padding: 2rem; border-radius: 12px;
    box-shadow: 0 0 40px rgba(255, 200, 50, 0.08);
    text-align: center;
  }
  h1 {
    color: #f0c040; font-size: 1.5rem; margin-bottom: 1rem;
    letter-spacing: 4px; text-transform: uppercase;
  }
  canvas {
    border: 2px solid #2a2a3a; border-radius: 4px;
    display: block; margin: 0 auto;
    background: #0e0e16;
  }
  .score-board {
    display: flex; justify-content: space-between;
    margin-top: 1rem; color: #8888aa; font-size: 0.9rem;
  }
  .score-board span { color: #f0c040; font-weight: bold; }
  .controls {
    margin-top: 1rem; display: flex; gap: 8px; justify-content: center;
    flex-wrap: wrap;
  }
  .controls button {
    background: #1e1e2e; color: #c0c0dd; border: 1px solid #3a3a4a;
    padding: 8px 18px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 0.85rem; transition: all 0.15s;
  }
  .controls button:hover { background: #2a2a3e; border-color: #f0c040; color: #f0c040; }
  .controls button:active { transform: scale(0.96); }
  .game-over {
    margin-top: 0.5rem; color: #ff6b6b; font-size: 1rem; min-height: 1.5rem;
  }
  .mobile-hint {
    color: #555577; font-size: 0.75rem; margin-top: 0.5rem;
  }
  @media (max-width: 500px) {
    .game-container { padding: 1rem; }
    canvas { width: 300px; height: 300px; }
  }
</style>
</head>
<body>
<div class="game-container">
  <h1>⊚ Snake</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="score-board">
    <div>Score: <span id="score">0</span></div>
    <div>High: <span id="highScore">0</span></div>
  </div>
  <div class="game-over" id="gameOver"></div>
  <div class="controls">
    <button id="restartBtn">↻ New Game</button>
  </div>
  <div class="mobile-hint">Arrow keys or swipe to steer</div>
</div>
<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const gameOverEl = document.getElementById('gameOver');

  // Game config
  const GRID_SIZE = 20;        // 20x20 grid
  const CELL_SIZE = 20;        // 20px per cell => 400x400 canvas
  const TICK_MS = 130;

  // State
  let snake = [];
  let food = {};
  let direction = 'RIGHT';
  let nextDirection = 'RIGHT';
  let score = 0;
  let highScore = parseInt(localStorage.getItem('sol_snake_high') || '0');
  let gameRunning = false;
  let gameLoop = null;
  let isGameOver = false;

  highScoreEl.textContent = highScore;

  // --- Helpers ---
  function randomGridPos() {
    return {
      x: Math.floor(Math.random() * GRID_SIZE),
      y: Math.floor(Math.random() * GRID_SIZE)
    };
  }

  function posKey(p) { return `${p.x},${p.y}`; }

  function spawnFood() {
    const occupied = new Set(snake.map(posKey));
    let attempts = 0;
    let pos;
    do {
      pos = randomGridPos();
      attempts++;
    } while (occupied.has(posKey(pos)) && attempts < 1000);
    food = pos;
  }

  // --- Drawing ---
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = '#191925';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(canvas.width, i * CELL_SIZE);
      ctx.stroke();
    }

    // Snake body
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const ratio = 1 - (i / snake.length) * 0.5;
      const g = Math.floor(180 + 60 * ratio);
      ctx.fillStyle = isHead ? '#f0c040' : `rgb(60, ${g}, 80)`;
      const pad = isHead ? 1 : 2;
      ctx.shadowBlur = isHead ? 8 : 0;
      ctx.shadowColor = '#f0c040';
      ctx.fillRect(
        seg.x * CELL_SIZE + pad,
        seg.y * CELL_SIZE + pad,
        CELL_SIZE - pad * 2,
        CELL_SIZE - pad * 2
      );
      ctx.shadowBlur = 0;
    });

    // Food
    ctx.fillStyle = '#ff6b6b';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff6b6b';
    const cx = food.x * CELL_SIZE + CELL_SIZE / 2;
    const cy = food.y * CELL_SIZE + CELL_SIZE / 2;
    ctx.beginPath();
    ctx.arc(cx, cy, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // --- Game logic ---
  function tick() {
    if (!gameRunning || isGameOver) return;

    direction = nextDirection;

    // Calculate new head
    const head = snake[0];
    let newHead = { ...head };
    switch (direction) {
      case 'RIGHT': newHead.x++; break;
      case 'LEFT':  newHead.x--; break;
      case 'UP':    newHead.y--; break;
      case 'DOWN':  newHead.y++; break;
    }

    // Wall collision
    if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
      endGame('Hit the wall');
      return;
    }

    // Self collision (check against current body, excluding tail which will move)
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
        endGame('Ate yourself');
        return;
      }
    }

    // Move
    snake.unshift(newHead);

    // Eat food?
    if (newHead.x === food.x && newHead.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
        localStorage.setItem('sol_snake_high', String(highScore));
      }
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame(reason) {
    isGameOver = true;
    gameRunning = false;
    if (gameLoop) { clearInterval(gameLoop); gameLoop = null; }
    gameOverEl.textContent = `💀 ${reason} — Score: ${score}`;
  }

  function startGame() {
    if (gameLoop) { clearInterval(gameLoop); gameLoop = null; }
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    direction = 'RIGHT';
    nextDirection = 'RIGHT';
    score = 0;
    isGameOver = false;
    gameRunning = true;
    scoreEl.textContent = '0';
    gameOverEl.textContent = '';
    spawnFood();
    draw();
    gameLoop = setInterval(tick, TICK_MS);
  }

  // --- Input ---
  function setDirection(dir) {
    const opposites = { 'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT' };
    if (dir !== opposites[direction]) {
      nextDirection = dir;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (!gameRunning && e.key.startsWith('Arrow')) {
      startGame();
    }
    switch (e.key) {
      case 'ArrowUp':    e.preventDefault(); setDirection('UP'); break;
      case 'ArrowDown':  e.preventDefault(); setDirection('DOWN'); break;
      case 'ArrowLeft':  e.preventDefault(); setDirection('LEFT'); break;
      case 'ArrowRight': e.preventDefault(); setDirection('RIGHT'); break;
      case ' ':          e.preventDefault(); if (!gameRunning) startGame(); break;
    }
  });

  // Touch/swipe support
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (!touchStartX) return;
    const rect = canvas.getBoundingClientRect();
    const endX = touchStartX;
    const endY = touchStartY;
    // Use the touch end position for swipe vector
    const t = e.changedTouches[0];
    const dx = t.clientX - endX;
    const dy = t.clientY - endY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return; // too short

    if (!gameRunning) startGame();

    if (absDx > absDy) {
      setDirection(dx > 0 ? 'RIGHT' : 'LEFT');
    } else {
      setDirection(dy > 0 ? 'DOWN' : 'UP');
    }
  }, { passive: true });

  document.getElementById('restartBtn').addEventListener('click', startGame);

  // Initial draw
  startGame();
})();
</script>
</body>
</html>
